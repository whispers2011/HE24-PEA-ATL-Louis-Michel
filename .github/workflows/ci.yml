name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Abhaengigkeiten installieren
        run: pip install -r requirements.txt

      - name: Ruff (Lint)
        run: ruff check .

      - name: Ruff (Format-Check)
        run: ruff format --check .

      - name: Tests mit Branch-Coverage
        run: pytest --cov=app --cov-branch --cov-fail-under=100

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Abhaengigkeiten installieren
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-Check
        run: npm run type-check

      - name: Tests
        run: npm run test

      - name: Build
        run: npm run build
